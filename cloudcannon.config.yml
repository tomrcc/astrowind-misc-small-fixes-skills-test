# --- Site config file (edited in the Data editor) ---------------------------

file_config:
  - glob: src/config.yaml
    _inputs:
      site:
        type: object
        options:
          preview:
            icon: language
      metadata:
        type: object
        options:
          preview:
            icon: share
      apps:
        type: object
        options:
          preview:
            icon: apps
      analytics:
        type: object
        options:
          preview:
            icon: monitoring
      ui:
        type: object
        options:
          preview:
            icon: palette
      ui.theme:
        type: select
        options:
          values:
            - system
            - light
            - dark
            - 'light:only'
            - 'dark:only'

  # Header + footer navigation, edited in the Data editor.
  - glob: src/data/navigation.json
    _inputs:
      header:
        type: object
        options:
          preview:
            icon: menu
      footer:
        type: object
        options:
          preview:
            icon: call_to_action
      header.links:
        type: array
        label: Header menu
        options:
          structures: _structures.nav_menu
      header.actions:
        type: array
        label: Header buttons
        options:
          structures: _structures.nav_actions
      footer.links:
        type: array
        label: Footer columns
        options:
          structures: _structures.nav_footer_columns
      footer.secondaryLinks:
        type: array
        label: Footer secondary links
        options:
          structures: _structures.nav_sublinks
      footer.socialLinks:
        type: array
        label: Footer social links
        options:
          structures: _structures.nav_social
      footer.footNote:
        type: html
        options:
          allow_custom_markup: true

# --- Snippets: MDX components usable in post bodies -------------------------
# Built-in `mdx_component` template resolves automatically (no _snippets_imports).
# Auto-import is wired in astro.config.ts so editors never see `import` lines.

_snippets:
  logo:
    template: mdx_component
    inline: false
    preview:
      text: Logo
