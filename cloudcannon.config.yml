# CloudCannon configuration — AstroWind

paths:
  static: public
  # Blog body images inserted via the rich-text toolbar land here (plain <img>).
  uploads: public/images

# CloudCannon's understanding of the markdown body. Posts use GFM tables.
markdown:
  options:
    gfm: true
    table: true

# Shared data files. `navigation` backs the header + footer; it's edited in the
# Data editor (see file_config), not inline — hrefs are resolved at build time
# through getPermalink()/getAsset() in src/navigation.ts and some links are
# `{type,url}` objects, so inline `@data` editing would bypass the resolver.
data_config:
  navigation:
    path: src/data/navigation.json

collection_groups:
  - heading: Pages
    collections:
      - pages
      - homes
      - landing
      - legal
  - heading: Blog
    collections:
      - post
  - heading: Site
    collections:
      - config

collections_config:
  # --- Page-builder pages -------------------------------------------------
  pages:
    path: src/content/pages
    # Exclude the subdirectory groups — they get their own collections below.
    glob:
      - '**/*.md'
      - '!homes/**'
      - '!landing/**'
    url: '/[slug]/'
    icon: wysiwyg
    _enabled_editors:
      - visual
      - data
    schemas:
      page_builder:
        path: .cloudcannon/schemas/page-builder.md
        name: Page
        new_preview_url: /about/
    add_options:
      - name: Page
        schema: page_builder
        icon: dashboard

  homes:
    path: src/content/pages/homes
    url: '/homes/[slug]/'
    icon: home
    _enabled_editors:
      - visual
      - data
    schemas:
      page_builder:
        path: .cloudcannon/schemas/page-builder.md
        name: Home variant
        new_preview_url: /homes/saas/
    add_options:
      - name: Home variant
        schema: page_builder
        icon: home

  landing:
    path: src/content/pages/landing
    url: '/landing/[slug]/'
    icon: ad
    _enabled_editors:
      - visual
      - data
    schemas:
      landing:
        path: .cloudcannon/schemas/landing.md
        name: Landing page
        new_preview_url: /landing/product/
    add_options:
      - name: Landing page
        schema: landing
        icon: ad

  legal:
    path: src/content/legal
    url: '/[slug]/'
    icon: gavel
    _enabled_editors:
      - content
      - data
    add_options:
      - name: Legal page
        editor: content

  # --- Blog ----------------------------------------------------------------
  post:
    path: src/data/post
    # Posts render at the site root via permalink `/%slug%` (utils/blog.ts),
    # and the slug is derived from the filename — so `[slug]` (filename) is correct.
    url: '/[slug]/'
    icon: post_add
    _enabled_editors:
      - visual
      - content
      - data
    add_options:
      - name: Blog Post
        editor: content
    _inputs:
      title:
        type: text
      excerpt:
        type: textarea
        comment: Short summary shown in listings and as the meta description.
      publishDate:
        type: datetime
      updateDate:
        type: datetime
      draft:
        type: switch
        comment: Draft posts are excluded from the build.
      image:
        type: image
        comment: Featured image. Accepts a remote URL or an uploaded image.
      category:
        type: text
      author:
        type: text
      tags:
        type: array
        comment: Freeform tags. Each becomes a /tag/… page.
      metadata:
        type: object
        options:
          preview:
            icon: settings
        comment: Advanced per-page SEO overrides. Optional.
      metadata.openGraph.images:
        type: array
        options:
          structures: _structures.og_images

  # --- Site config ---------------------------------------------------------
  config:
    path: src
    glob:
      - config.yaml
    disable_url: true
    icon: settings
    _enabled_editors:
      - data

# --- Global inputs ----------------------------------------------------------
# Block field types, applied across the page-builder collections. Collection-
# scoped inputs (e.g. post.title) still override these for their own files.
_inputs:
  content_blocks:
    type: array
    label: Page sections
    options:
      structures: _structures.content_blocks
  title:
    type: html
    options:
      allow_custom_markup: true
      styles: .cloudcannon/styles/editor.css
  subtitle:
    type: html
    options:
      allow_custom_markup: true
      styles: .cloudcannon/styles/editor.css
  tagline:
    type: text
  content:
    type: html
    options:
      allow_custom_markup: true
      styles: .cloudcannon/styles/editor.css
  description:
    type: html
    options:
      allow_custom_markup: true
      styles: .cloudcannon/styles/editor.css
  information:
    type: textarea
  icon:
    type: text
    comment: 'Icon name, e.g. tabler:rocket or flat-color-icons:template'
  columns:
    type: number
  count:
    type: number
  button:
    type: text
  linkText:
    type: text
  isReversed:
    type: switch
  isAfterContent:
    type: switch
  isBeforeContent:
    type: switch
  id:
    type: text
    comment: Optional anchor id for in-page links (e.g. "features" → /#features).
  image:
    type: object
    options:
      preview:
        icon: image
  image.src:
    type: image
    options:
      paths:
        uploads: src/assets/images
        static: ''
  image.alt:
    type: text
  actions:
    type: array
    options:
      structures: _structures.actions
  items:
    type: array
    options:
      structures: _structures.items
  stats:
    type: array
    options:
      structures: _structures.stats
  prices:
    type: array
    options:
      structures: _structures.prices
  testimonials:
    type: array
    options:
      structures: _structures.testimonials
  inputs:
    type: array
    options:
      structures: _structures.form_inputs
  images:
    type: array
    options:
      structures: _structures.brand_images
  icons:
    type: array
    comment: Icon names for brand logos.
  textarea:
    type: object
    options:
      preview:
        icon: notes
  disclaimer:
    type: object
    options:
      preview:
        icon: gpp_maybe
  callToAction:
    type: object
    options:
      preview:
        icon: ads_click
  callToAction.text:
    type: text
  callToAction.href:
    type: text
  callToAction.icon:
    type: text
  callToAction.variant:
    type: select
    options:
      values:
        - primary
        - secondary
        - tertiary
        - link
  callToAction.target:
    type: select
    options:
      allow_create: true
      values:
        - '_blank'
        - '_self'
  callToAction2:
    type: object
    options:
      preview:
        icon: ads_click
  callToAction2.text:
    type: text
  callToAction2.href:
    type: text
  callToAction2.icon:
    type: text
  callToAction2.variant:
    type: select
    options:
      values:
        - primary
        - secondary
        - tertiary
        - link
  callToAction2.target:
    type: select
    options:
      allow_create: true
      values:
        - '_blank'
        - '_self'

